<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <p id="heading">Play with the Computer!</p>
    <h3>Select One</h3>
    <div id="options">
        
        <button class="options">Rock</button>
        <button class="options">Paper</button>
        <button class="options">Scissors</button>
    </div>
    <p id="yourchoice"></p>
    <p id="computerChoice"></p>
    
    <p id="score">
        <span class="playerscore">Player</span>: <span class="scores">0</span> 
        <span class="computerscore"> Computer</span>:<span class="scores">0</span>

    </p>
    <div id="resetgame">
        <button class="reset">Reset Game</button>
    </div>
    
    <p id="winner"></p>
    

    <p id="newgame">Start a new game here!</p>

    <div id="new">
        <button class="game">New Game</button>
        
    </div>

    <script src="script.js"></script>

 
</body>
</html>
